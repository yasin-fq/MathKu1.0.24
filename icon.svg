<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="50%" stop-color="#EC407A"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background with brand gradient -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Decorative dots for playful math theme -->
  <circle cx="80" cy="90" r="14" fill="#FFD54F" opacity="0.85"/>
  <circle cx="432" cy="78" r="9" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="64" cy="420" r="11" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="448" cy="430" r="13" fill="#FFD54F" opacity="0.75"/>
  <circle cx="256" cy="56" r="7" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="54" cy="252" r="6" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="462" cy="248" r="7" fill="#FFD54F" opacity="0.65"/>

  <!-- Math text "1+2" -->
  <text x="256" y="340"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="240"
        font-weight="900"
        text-anchor="middle"
        fill="url(#textGrad)"
        filter="url(#softShadow)">1+2</text>
</svg>
