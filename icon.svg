<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="50%" stop-color="#EC407A"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background with brand gradient -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Decorative dots -->
  <circle cx="92" cy="100" r="16" fill="#FFD54F" opacity="0.9"/>
  <circle cx="424" cy="82" r="10" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="72" cy="420" r="12" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="436" cy="428" r="14" fill="#FFD54F" opacity="0.8"/>
  <circle cx="256" cy="58" r="8" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="58" cy="248" r="6" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="458" cy="252" r="7" fill="#FFD54F" opacity="0.6"/>

  <!-- Big white M letter (MathKu) -->
  <text x="256" y="372"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="300"
        font-weight="900"
        text-anchor="middle"
        fill="#FFFFFF"
        filter="url(#softShadow)">M</text>

  <!-- Plus badge in top-right (math accent) -->
  <g transform="translate(388, 136)">
    <circle r="48" fill="#FFFFFF"/>
    <circle r="48" fill="none" stroke="#FFD54F" stroke-width="4"/>
    <text x="0" y="18"
          font-family="'Arial Black', sans-serif"
          font-size="60"
          font-weight="900"
          text-anchor="middle"
          fill="#FF7043">+</text>
  </g>
</svg>
